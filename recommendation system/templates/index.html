<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
        }
        select, button {
            padding: 10px;
            margin: 10px;
        }
        .result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🎬 Movie Recommendation System</h1>

    <form method="POST">
        <select name="movie">
            {% for movie in movies %}
                <option value="{{movie}}">{{movie}}</option>
            {% endfor %}
        </select>
        <button type="submit">Recommend</button>
    </form>

    <div class="result">
        <h2>Recommended Movies:</h2>
        <ul>
            {% for rec in recommendations %}
                <li>{{rec}}</li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
